<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Management - ThreeQ Admin</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="header-root"></div>

  <main class="main-content" style="max-width: 1100px;">
    <div class="admin-layout">
      <!-- Admin Sidebar -->
      <aside class="admin-sidebar">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">
          <div class="logo-badge" style="width: 36px; height: 36px; font-size: 1rem;">A</div>
          <div>
            <h3 style="font-size: 1rem; font-weight: 900; color: #fff; line-height: 1;">Admin Portal</h3>
            <span style="font-size: 0.65rem; font-weight: 700; color: var(--emerald-light); text-transform: uppercase;">ThreeQ Engine</span>
          </div>
        </div>

        <nav style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 2rem;">
          <a href="admin-dashboard.html" class="nav-link">📊 Dashboard</a>
          <a href="admin-quizzes.html" class="nav-link active">📋 Quizzes List</a>
          <a href="admin-quiz-new.html" class="nav-link">➕ Create Quiz</a>
          <a href="admin-stats.html" class="nav-link">📈 Analytics & Logs</a>
        </nav>
      </aside>

      <!-- Admin Main View -->
      <section class="admin-main">
        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
          <div>
            <span class="badge badge-emerald" style="margin-bottom: 0.25rem;">Repository</span>
            <h1 style="font-size: 1.75rem; font-weight: 900; color: #fff;">Quiz Management</h1>
            <p style="font-size: 0.85rem; color: var(--text-secondary);">Filter, edit, approve, and publish daily quizzes</p>
          </div>

          <a href="admin-quiz-new.html" class="btn btn-emerald" style="font-size: 0.85rem; padding: 8px 16px;">
            ➕ Create Manual Quiz
          </a>
        </div>

        <!-- Filter Controls -->
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
          <input type="text" id="filter-search" class="form-input" placeholder="Search by date (YYYY-MM-DD)..." style="max-width: 280px; font-size: 0.85rem;">
          <select id="filter-status" class="form-select" style="max-width: 200px; font-size: 0.85rem;">
            <option value="">All Statuses</option>
            <option value="draft">Draft Only</option>
            <option value="approved">Approved Only</option>
            <option value="published">Published Only</option>
          </select>
        </div>

        <!-- Quizzes Table -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Quiz Date</th>
                <th>Title</th>
                <th>Source</th>
                <th>Status</th>
                <th style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="quizzes-table-body">
              <tr>
                <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading quizzes repository...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    let allQuizzes = [];

    document.addEventListener('DOMContentLoaded', () => {
      App.renderHeader('');
      App.renderFooter();
      App.initCustomSelects();

      if (!Storage.getAdminToken()) {
        window.location.href = 'admin-login.html';
        return;
      }

      loadQuizzes();

      document.getElementById('filter-status').addEventListener('change', loadQuizzes);
      document.getElementById('filter-search').addEventListener('input', renderTable);
    });

    async function loadQuizzes() {
      const status = document.getElementById('filter-status').value;
      try {
        const res = await API.getAdminQuizzes(status);
        allQuizzes = res.quizzes || [];
        renderTable();
      } catch (err) {
        console.error('Fetch quizzes error:', err);
      }
    }

    function renderTable() {
      const query = document.getElementById('filter-search').value.trim();
      const filtered = allQuizzes.filter(q => !query || q.quiz_date.includes(query));

      const tbody = document.getElementById('quizzes-table-body');
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">No quizzes found matching criteria.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(q => `
        <tr>
          <td style="font-family: var(--font-mono); font-weight: 700;">${q.quiz_date}</td>
          <td style="font-weight: 600; color: #fff;">${q.title}</td>
          <td style="color: var(--text-secondary);">${q.generated_by === 'ai' ? 'Gemini AI' : 'Manual'}</td>
          <td>${getStatusBadge(q.status)}</td>
          <td style="text-align: right;">
            <a href="admin-quiz-edit.html?id=${q.id}" class="btn btn-glass" style="font-size: 0.75rem; padding: 4px 10px;">Edit / Review</a>
            ${q.status !== 'published' ? `<button type="button" class="btn btn-danger" style="font-size: 0.75rem; padding: 4px 10px; margin-left: 4px;" onclick="deleteDraft('${q.id}')">Delete</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    async function deleteDraft(id) {
      if (!confirm('Are you sure you want to delete this draft quiz?')) return;
      try {
        await API.deleteDraftQuiz(id);
        allQuizzes = allQuizzes.filter(q => q.id !== id);
        renderTable();
      } catch (err) {
        alert(err.message || 'Failed to delete draft quiz.');
      }
    }

    function getStatusBadge(status) {
      switch ((status || '').toLowerCase()) {
        case 'published':
          return `<span class="badge badge-emerald">🌐 Published</span>`;
        case 'approved':
          return `<span class="badge badge-saffron">✓ Approved</span>`;
        case 'draft':
        default:
          return `<span class="badge badge-slate">⏱️ Draft</span>`;
      }
    }
  </script>
</body>
</html>
