<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - ThreeQ Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="header-root"></div>

  <main class="main-content" style="max-width: 450px; padding-top: 3rem;">
    <div class="glass-card glass-card-emerald">
      <div style="width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, var(--emerald-main), var(--emerald-dark)); color: #fff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: 0 0 20px var(--emerald-glow);">
        🛡️
      </div>

      <div style="text-align: center; margin-bottom: 1.5rem;">
        <span class="badge badge-emerald" style="margin-bottom: 0.25rem;">Admin Security Portal</span>
        <h1 style="font-size: 1.65rem; font-weight: 900; color: #fff;">ThreeQ Admin Access</h1>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">Sign in to manage, review, and publish daily quizzes</p>
      </div>

      <div id="login-error" style="display: none; padding: 0.75rem; border-radius: 8px; background: rgba(239,68,68,0.15); color: #fca5a5; font-size: 0.85rem; margin-bottom: 1.25rem; border: 1px solid rgba(239,68,68,0.3);"></div>

      <form id="admin-login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" value="admin@quizkeralam.com" required placeholder="admin@quizkeralam.com">
        </div>

        <div class="form-group" style="margin-bottom: 1.75rem;">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" required placeholder="••••••••••••">
        </div>

        <button type="submit" class="btn btn-emerald" style="width: 100%;" id="btn-login">
          Sign In to Dashboard →
        </button>
      </form>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.renderHeader('');
      App.renderFooter();

      // Check if already logged in
      if (Storage.getAdminToken()) {
        window.location.href = 'admin-dashboard.html';
      }

      document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn-login');
        const errEl = document.getElementById('login-error');

        errEl.style.display = 'none';
        btn.innerText = 'Signing In...';
        btn.disabled = true;

        try {
          const res = await API.adminLogin({ email, password });
          Storage.setAdminToken(res.token);
          window.location.href = 'admin-dashboard.html';
        } catch (err) {
          console.error('Login failed:', err);
          errEl.innerText = err.message || 'Invalid admin credentials';
          errEl.style.display = 'block';
          btn.innerText = 'Sign In to Dashboard →';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
