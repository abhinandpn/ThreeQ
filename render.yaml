services:
  - type: web
    name: threeq-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://abhinandpn.github.io
      - key: JWT_EXPIRY_MINUTES
        value: "1440"
      - key: ADMIN_SEED_NAME
        value: ThreeQ Admin
      - key: GEMINI_MODEL
        value: gemini-3.5-flash-lite
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_GENERATION_KEY
        sync: false
