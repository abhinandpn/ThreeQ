<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found - ThreeQ</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="header-root"></div>

  <main class="main-content" style="max-width: 550px; text-align: center; padding-top: 4rem;">
    <div class="glass-card glass-card-emerald">
      <div style="font-size: 3rem; margin-bottom: 0.5rem;">🧭</div>
      <h1 style="font-size: 4rem; font-weight: 900; color: #fff; font-family: var(--font-mono); margin-bottom: 0.25rem;">404</h1>
      <h2 style="font-size: 1.35rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem;">Page Not Found</h2>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5;">
        The page or quiz link you are looking for doesn't exist or has moved.
      </p>

      <a href="index.html" class="btn btn-emerald">Return to ThreeQ Home →</a>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.renderHeader('');
      App.renderFooter();
    });
  </script>
</body>
</html>
