<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Archive - ThreeQ</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="header-root"></div>

  <main class="main-content" style="max-width: 800px;">
    <div style="margin-bottom: 2rem;">
      <span class="badge badge-emerald" style="margin-bottom: 0.5rem;">Daily Archive</span>
      <h1 style="font-size: 2.25rem; font-weight: 900; color: #fff;">Previous Daily Quizzes</h1>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Practice previous 3-question current affairs quizzes from our daily archives.</p>
    </div>

    <div id="archive-list" style="display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 2rem;">
      <div class="glass-card" style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">Loading archive quizzes...</div>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 1rem;">
      <button type="button" class="btn btn-glass" id="btn-prev-page" disabled>← Previous Page</button>
      <span style="font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono);" id="page-indicator">Page 1</span>
      <button type="button" class="btn btn-glass" id="btn-next-page" disabled>Next Page →</button>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentPage = 1;
    let totalPages = 1;

    document.addEventListener('DOMContentLoaded', () => {
      App.renderHeader('archive');
      App.renderFooter();

      loadArchive(currentPage);

      document.getElementById('btn-prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadArchive(currentPage);
        }
      });

      document.getElementById('btn-next-page').addEventListener('click', () => {
        if (currentPage < totalPages) {
          currentPage++;
          loadArchive(currentPage);
        }
      });
    });

    async function loadArchive(page) {
      const listEl = document.getElementById('archive-list');
      listEl.innerHTML = `<div class="glass-card" style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">Loading archive quizzes...</div>`;

      try {
        const res = await API.getPublishedQuizzes(page, 10);
        const quizzes = res.quizzes || [];
        const total = res.total || 0;
        totalPages = Math.ceil(total / 10) || 1;

        document.getElementById('page-indicator').innerText = `Page ${page} of ${totalPages}`;
        document.getElementById('btn-prev-page').disabled = page === 1;
        document.getElementById('btn-next-page').disabled = page >= totalPages;

        if (quizzes.length === 0) {
          listEl.innerHTML = `<div class="glass-card" style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">No previous quizzes found.</div>`;
          return;
        }

        listEl.innerHTML = quizzes.map(q => `
          <a href="quiz-date.html?date=${q.quiz_date}" class="glass-card glass-card-interactive" style="padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div style="width: 44px; height: 44px; border-radius: 12px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--emerald-light); font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;">📅</div>
              <div>
                <h3 style="font-weight: 800; color: #fff; font-size: 1.05rem; margin-bottom: 2px;">${q.title}</h3>
                <div style="display: flex; align-items: center; gap: 12px; font-size: 0.75rem; color: var(--text-secondary);">
                  <span>${App.formatDateKolkata(q.quiz_date)}</span>
                  <span>•</span>
                  <span style="color: var(--emerald-light); font-weight: 700;">3 Questions</span>
                </div>
              </div>
            </div>
            <span class="btn btn-glass" style="font-size: 0.8rem; padding: 6px 12px;">Start →</span>
          </a>
        `).join('');
      } catch (err) {
        console.error('Archive error:', err);
        listEl.innerHTML = `<div class="glass-card" style="text-align: center; color: #fca5a5; font-size: 0.85rem;">Failed to load archive quizzes.</div>`;
      }
    }
  </script>
</body>
</html>
